---
# ============================================================
# Farm Sonar - selene custom stdlib for FiveM natives + lifecycle.
# Declares globals provided by the FiveM Lua runtime so selene does not
# flag them as undefined.
# ============================================================

base: lua52

globals:
  # ---- Lifecycle ----
  AddEventHandler:
    args:
      - type: string
      - type: function
  RegisterNetEvent:
    args:
      - type: string
      - { type: function, required: false }
  TriggerEvent:
    args:
      - type: string
      - { type: any, required: false }
  TriggerServerEvent:
    args:
      - type: string
      - { type: any, required: false }
  TriggerClientEvent:
    args:
      - type: string
      - type: any
      - { type: any, required: false }
  RemoveEventHandler:
    args:
      - type: any
  CreateThread:
    args:
      - type: function
  Wait:
    args:
      - type: number
  Citizen:
    any: true

  # ---- Resource introspection ----
  GetCurrentResourceName: { args: [] }
  GetResourceState:
    args:
      - type: string
  GetResourceMetadata:
    args:
      - type: string
      - type: string
      - { type: number, required: false }
  GetNumResourceMetadata:
    args:
      - type: string
      - type: string
  LoadResourceFile:
    args:
      - type: string
      - type: string

  # ---- Convars ----
  GetConvar:
    args:
      - type: string
      - { type: string, required: false }
  GetConvarInt:
    args:
      - type: string
      - { type: number, required: false }
  SetConvar:
    args:
      - type: string
      - type: string

  # ---- Player / source helpers (server) ----
  GetPlayerName:
    args:
      - type: any
  GetPlayerIdentifiers:
    args:
      - type: any
  source: { property: read-only }

  # ---- Server / client side detection ----
  IsDuplicityVersion: { args: [] }

  # ---- Exports (resource interop) ----
  exports: { any: true }

  # ---- Commands ----
  RegisterCommand:
    args:
      - type: string
      - type: function
      - { type: bool, required: false }
  ExecuteCommand:
    args:
      - type: string

  # ---- ACE permissions ----
  IsPlayerAceAllowed:
    args:
      - type: any
      - type: string

  # ---- NUI bridge ----
  SendNUIMessage:
    args:
      - type: table
  RegisterNUICallback:
    args:
      - type: string
      - type: function
  SetNuiFocus:
    args:
      - type: bool
      - { type: bool, required: false }
  SetNuiFocusKeepInput:
    args:
      - type: bool

  # ---- FiveM vector types ----
  vector3:
    args:
      - type: number
      - type: number
      - type: number
  vec3:
    args:
      - type: number
      - type: number
      - type: number
  vector4:
    args:
      - type: number
      - type: number
      - type: number
      - type: number

  # ---- Model loading (client) ----
  GetHashKey:
    args:
      - type: string
  RequestModel:
    args:
      - type: any
  HasModelLoaded:
    args:
      - type: any
  SetModelAsNoLongerNeeded:
    args:
      - type: any
  CreateObjectNoOffset:
    args:
      - type: any
      - type: number
      - type: number
      - type: number
      - type: bool
      - type: bool
      - type: bool

  # ---- Object / entity creation (client) ----
  CreateObject:
    args:
      - type: any
      - type: number
      - type: number
      - type: number
      - type: bool
      - type: bool
      - type: bool
  DeleteObject:
    args:
      - type: any
  DoesEntityExist:
    args:
      - type: any
  SetEntityHeading:
    args:
      - type: any
      - type: number
  FreezeEntityPosition:
    args:
      - type: any
      - type: bool
  SetEntityCollision:
    args:
      - type: any
      - type: bool
      - type: bool
  PlaceObjectOnGroundProperly:
    args:
      - type: any
  SetEntityAsMissionEntity:
    args:
      - type: any
      - type: bool
      - type: bool
  SetEntityDistanceCullingRadius:
    args:
      - type: any
      - type: number
  SetEntityScale:
    args:
      - type: any
      - type: number

  # ---- Animation / ped helpers (client) ----
  RequestAnimDict:
    args:
      - type: string
  HasAnimDictLoaded:
    args:
      - type: string
  RemoveAnimDict:
    args:
      - type: string
  PlayerPedId:
    args: []
  ClearPedTasks:
    args:
      - type: any
  ClearOverrideWeather:
    args: []
  SetWeatherTypePersist:
    args:
      - type: string
  SetWeatherTypeOverTime:
    args:
      - type: string
      - type: number

  # ---- Particle FX helpers (client) ----
  RequestNamedPtfxAsset:
    args:
      - type: string
  HasNamedPtfxAssetLoaded:
    args:
      - type: string
  UseParticleFxAssetNextCall:
    args:
      - type: string
  StartParticleFxLoopedAtCoord:
    args:
      - type: string
      - type: number
      - type: number
      - type: number
      - type: number
      - type: number
      - type: number
      - type: number
      - type: bool
      - type: bool
      - type: bool
      - type: bool
  StopParticleFxLooped:
    args:
      - type: any
      - type: bool
  RemoveNamedPtfxAsset:
    args:
      - type: string

  joaat:
    args:
      - type: string
  IsModelInCdimage:
    args:
      - type: any
  GetGameTimer:
    args: []
  CreatePed:
    args:
      - type: number
      - type: any
      - type: number
      - type: number
      - type: number
      - type: number
      - type: bool
      - type: bool
  DeletePed:
    args:
      - type: any
  SetEntityInvincible:
    args:
      - type: any
      - type: bool
  SetBlockingOfNonTemporaryEvents:
    args:
      - type: any
      - type: bool
  GetEntityCoords:
    args:
      - type: any
  GetEntityModel:
    args:
      - type: any
  GetGamePool:
    args:
      - type: string
  GetVehiclePedIsIn:
    args:
      - type: any
      - type: bool
  GetPedInVehicleSeat:
    args:
      - type: any
      - type: number
  GetVehicleNumberPlateText:
    args:
      - type: any
  GetDisplayNameFromVehicleModel:
    args:
      - type: any
  IsEntityAVehicle:
    args:
      - type: any
  NetworkHasControlOfEntity:
    args:
      - type: any
  NetworkRequestControlOfEntity:
    args:
      - type: any
  DisableControlAction:
    args:
      - type: number
      - type: number
      - type: bool
  SetVehicleDoorOpen:
    args:
      - type: any
      - type: number
      - type: bool
      - type: bool
  SetVehicleDoorShut:
    args:
      - type: any
      - type: number
      - type: bool
  SetVehicleEngineHealth:
    args:
      - type: any
      - type: number
  SetVehicleEngineOn:
    args:
      - type: any
      - type: bool
      - type: bool
      - type: bool
  SetVehicleUndriveable:
    args:
      - type: any
      - type: bool
  # ---- Print / debug ----
  print:
    args:
      - type: any
