---
# ============================================================
# Farm Sonar — selene custom stdlib for FiveM natives + lifecycle.
# Declares globals provided by the FiveM Lua runtime so selene does not
# flag them as undefined.
# ============================================================

base: lua53

globals:
  # ---- Lifecycle ----
  AddEventHandler:
    args:
      - type: string
      - type: function
  RegisterNetEvent:
    args:
      - type: string
      - { type: function, required: false }
  TriggerEvent:
    args:
      - type: string
      - { type: any, required: false }
  TriggerServerEvent:
    args:
      - type: string
      - { type: any, required: false }
  TriggerClientEvent:
    args:
      - type: string
      - type: any
      - { type: any, required: false }
  RemoveEventHandler:
    args:
      - type: any
  CreateThread:
    args:
      - type: function
  Wait:
    args:
      - type: number
  Citizen:
    any: true

  # ---- Resource introspection ----
  GetCurrentResourceName: { args: [] }
  GetResourceState:
    args:
      - type: string
  GetResourceMetadata:
    args:
      - type: string
      - type: string
      - { type: number, required: false }
  GetNumResourceMetadata:
    args:
      - type: string
      - type: string
  LoadResourceFile:
    args:
      - type: string
      - type: string

  # ---- Convars ----
  GetConvar:
    args:
      - type: string
      - { type: string, required: false }
  GetConvarInt:
    args:
      - type: string
      - { type: number, required: false }
  SetConvar:
    args:
      - type: string
      - type: string

  # ---- Player / source helpers (server) ----
  GetPlayerName:
    args:
      - type: any
  GetPlayerIdentifiers:
    args:
      - type: any
  source: { property: read-only }

  # ---- Server / client side detection ----
  IsDuplicityVersion: { args: [] }

  # ---- Exports (resource interop) ----
  exports: { any: true }

  # ---- Commands ----
  RegisterCommand:
    args:
      - type: string
      - type: function
      - { type: bool, required: false }
  ExecuteCommand:
    args:
      - type: string

  # ---- ACE permissions ----
  IsPlayerAceAllowed:
    args:
      - type: any
      - type: string

  # ---- NUI bridge ----
  SendNUIMessage:
    args:
      - type: table
  RegisterNUICallback:
    args:
      - type: string
      - type: function
  SetNuiFocus:
    args:
      - type: bool
      - { type: bool, required: false }
  SetNuiFocusKeepInput:
    args:
      - type: bool

  # ---- FiveM vector types ----
  vector3:
    args:
      - type: number
      - type: number
      - type: number
  vector4:
    args:
      - type: number
      - type: number
      - type: number
      - type: number

  # ---- Model loading (client) ----
  GetHashKey:
    args:
      - type: string
  RequestModel:
    args:
      - type: any
  HasModelLoaded:
    args:
      - type: any
  SetModelAsNoLongerNeeded:
    args:
      - type: any

  # ---- Object / entity creation (client) ----
  CreateObject:
    args:
      - type: any
      - type: number
      - type: number
      - type: number
      - type: bool
      - type: bool
      - type: bool
  DeleteObject:
    args:
      - type: any
  DoesEntityExist:
    args:
      - type: any
  SetEntityHeading:
    args:
      - type: any
      - type: number
  FreezeEntityPosition:
    args:
      - type: any
      - type: bool
  SetEntityCollision:
    args:
      - type: any
      - type: bool
      - type: bool
  PlaceObjectOnGroundProperly:
    args:
      - type: any

  # ---- Print / debug ----
  print:
    args:
      - type: any
